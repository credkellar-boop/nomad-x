global:
  scrape_interval: 5s # High-frequency scraping for real-time telemetry
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'nomad-x-api'
    static_configs:
      - targets: ['backend-api-1:8000', 'backend-api-2:8000']
    metrics_path: '/metrics' # Assumes a Prometheus exporter middleware is attached

  - job_name: 'nomad-agent'
    static_configs:
      - targets: ['localhost:4646']
    metrics_path: '/v1/metrics'
    params:
      format: ['prometheus']
      
