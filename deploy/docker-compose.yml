version: '3.8'

# Local testing cluster before pushing to Nomad
services:
  api:
    build: 
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ../api/src:/usr/src/app/src
    restart: unless-stopped

  redis-cache:
    image: redis:alpine
    ports:
      - "6379:6379"
      
