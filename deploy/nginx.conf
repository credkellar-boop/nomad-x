worker_processes auto;
events { worker_connections 4096; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Optimize for high throughput B2B traffic
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    upstream nomad_api_backend {
        # Nomad load balancing dynamic DNS or IP resolution goes here
        server backend-api-1:8000;
        server backend-api-2:8000;
    }

    server {
        listen 80;
        server_name api.nomad-x.corporate;

        location / {
            proxy_pass http://nomad_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Allow WebSocket connections if transitioning to streaming AI responses
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
