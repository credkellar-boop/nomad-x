[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

[FILTER]
    Name         record_modifier
    Match        *
    Record       cluster dc1
    Record       application nomad-x

[OUTPUT]
    Name         stdout
    Match        *
    # In production, route this to your centralized logging server
    # Name       es
    # Host       elasticsearch-cluster
